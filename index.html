<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker </title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind CSS and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="">
    <div class="min-h-200 max-w-sm mx-auto shadow-lg rounded-lg border-y-4 border-primary mt-20 px-5">
        <div class="text-center pt-20">
            <div class="mb-5">
                <img class="mx-auto" src="assets/github-logo.png" alt="">
            </div>
            <h2 class="text-3xl font-bold">GitHub Issues Tracker</h2>
            <p>Sign in to manage your issues</p>
        </div>
        <div class="login-form flex justify-center">
            <fieldset class="fieldset  border-base-300  w-full p-4">
                <label class="labe text-black">Username</label>
                <input id="input-username" type="text" class="input w-full" placeholder="Enter Username" />
                <p class="text-[#4A00FF]">username:admin</p>

                <label class="label text-black">Password</label>
                <input id="input-password" type="password" class="input w-full" placeholder="Enter Password" />
                <p class="text-[#4A00FF]">Password:admin123</p>


                <button id="sign-btn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </div>
        <div class="divider px-5">OR</div>
        <div class="mx-10 text-center space-y-2">
            <p>Demo Credentials:</p>
            <div class="bg-sky-100 rounded text-center p-4">
                <p>Username: admin</p>
                <p>Password: admin123</p>
            </div>
        </div>

    </div>
    <script src="script/script.js"></script>
</body>

</html>
