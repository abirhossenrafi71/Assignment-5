<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker | issue-page</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind CSS and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header class="bg-base-100 shadow-sm">
        <div class="navbar w-11/12 mx-auto md:flex-row flex-col gap-3">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <img class="w-10" src="assets/github-logo.png" alt="" srcset="">
                    <h3 class="font-bold md:text-3xl text-2xl">GitHub Issues Tracker</h3>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="input-search" placeholder="Search"
                    class="input input-bordered w-full md:w-auto" />
                <button onclick="searchIssues()" class="btn btn-primary">Search <i
                        class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </header>

    <section id="filter-section" class="mt-10 ">
        <div class="mx-auto md:w-10/12 w-full p-5 flex gap-2 shadow-lg rounded-md">
            <button onclick="loadAIssue()" class="btn active">All</button>
            <button onclick="showOpen()" class="btn ">Open</button>
            <button onclick="showClosed()" class="btn ">Closed</button>
        </div>
    </section>
    <section id="count-section" class="md:w-10/12 w-full mx-auto shadow-lg mt-10 p-5 rounded-md flex justify-between">
        <div class="flex items-center gap-2">
            <div><img class="md:w-15 w-20" src="assets/Aperture.png" alt="" srcset=""></div>

            <div>
                <h3 id="issue-count" class="font-medium md:text-2xl text-xl">0 Issues</h3>
                <p class="md:text-xl text-xs">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center justify-center gap-2">
            <div class="flex gap-1 items-center">
                <i class="fa-solid fa-circle text-[#00A96E]"></i>
                <p>Open</p>
            </div>
            <div class="flex gap-1 items-center">
                <i class="fa-solid fa-circle text-[#A855F7]"></i>
                <p>Closed</p>
            </div>
        </div>
    </section>

    <span id="spinner" class="loading loading-dots loading-xl block mx-auto p-10 hidden"></span>


    <section id="issue-container"
        class="bg-[#EFEFEF] grid grid-cols-1 md:grid-cols-4 sm:grid-cols-2 gap-5 md:w-10/12 mx-auto shadow-md mt-10 p-5 rounded-md ">


    </section>


    <!-- Open the modal using ID.showModal() method -->

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="load-modal">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="script/issue.js"></script>
</body>

</html>
